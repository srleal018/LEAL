<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Hub - Serviços</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root {
--bg-color: #0c0c0e;
--card-bg: #16161a;
--primary: #8b5cf6;
--primary-hover: #7c3aed;
--text-main: #f4f4f5;
--text-muted: #a1a1aa;
--border: #27272a;
}

* {
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body {
background: var(--bg-color);
color: var(--text-main);
}

/* LOGIN */

#login-screen {
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.btn {
padding:10px 20px;
border-radius:8px;
border:none;
cursor:pointer;
font-weight:600;
}

.btn-primary {
background:var(--primary);
color:white;
}

/* HEADER */

header {
padding:15px 5%;
display:flex;
justify-content:space-between;
border-bottom:1px solid var(--border);
}

.user-nav {
display:flex;
gap:10px;
}

/* GRID */

.services-grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:30px 5%;
}

.service-card {
background:var(--card-bg);
border:1px solid var(--border);
border-radius:12px;
padding:15px;
}

.delete-btn {
background:#991b1b;
color:white;
font-size:12px;
padding:5px 10px;
margin-top:10px;
border-radius:5px;
}

.modal {
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.modal-content {
background:var(--card-bg);
padding:25px;
border-radius:15px;
width:400px;
}

input,textarea,select {
width:100%;
padding:10px;
margin-bottom:10px;
background:#0f0f12;
border:1px solid var(--border);
color:white;
border-radius:8px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login-screen">

<div style="background:#16161a;padding:40px;border-radius:15px;">

<h1>Roblox Hub</h1>

<button class="btn btn-primary" id="btn-login">
Entrar com Google
</button>

</div>

</div>

<!-- APP -->

<div id="app-screen" style="display:none;">

<header>

<h2>ROBLOX HUB</h2>

<div class="user-nav">

<button class="btn" id="btn-add">
Novo Anúncio
</button>

<button class="btn adm-only"
id="btn-add-mod"
style="display:none;">
Adicionar Moderador
</button>

<button class="btn"
id="btn-logout">
Sair
</button>

</div>

</header>

<div id="feed" class="services-grid"></div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<form id="form-ad">

<input id="title"
placeholder="Título"
required>

<textarea id="desc"
placeholder="Descrição"
required></textarea>

<input id="price"
placeholder="Preço"
required>

<button class="btn btn-primary">
Publicar
</button>

</form>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",

authDomain: "bloco-de-notas-85103.firebaseapp.com",

projectId: "bloco-de-notas-85103",

storageBucket: "bloco-de-notas-85103.firebasestorage.app",

messagingSenderId: "890697512853",

appId: "1:890697512853:web:7bff196880f1b010d5289c"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider = new GoogleAuthProvider();

/* HIERARQUIA */

const OWNER_UID =
"hF0CdUoF5DZF036PlgQPC8T04oy1";

let USER_ROLE = "user";

/* CARREGAR ROLE */

async function loadUserRole(user) {

if (user.uid === OWNER_UID) {

USER_ROLE = "owner";

return;

}

const roleRef =
doc(db,"roles",user.uid);

const roleSnap =
await getDoc(roleRef);

if (roleSnap.exists()) {

USER_ROLE =
roleSnap.data().role;

} else {

USER_ROLE = "user";

}

}

/* LOGIN */

onAuthStateChanged(auth,
async (user)=>{

if (user) {

await loadUserRole(user);

document.getElementById("login-screen")
.style.display="none";

document.getElementById("app-screen")
.style.display="block";

if (USER_ROLE==="owner") {

document.getElementById("btn-add-mod")
.style.display="block";

}

listenPosts();

}

else {

document.getElementById("login-screen")
.style.display="flex";

document.getElementById("app-screen")
.style.display="none";

}

});

/* BOTÕES */

document.getElementById("btn-login")
.onclick =
()=> signInWithPopup(auth,provider);

document.getElementById("btn-logout")
.onclick =
()=> signOut(auth);

document.getElementById("btn-add")
.onclick =
()=> document.getElementById("modal")
.style.display="flex";

/* ADICIONAR MOD */

document.getElementById("btn-add-mod")
.onclick = async ()=>{

if (USER_ROLE!=="owner") return;

const uid =
prompt("UID do usuário:");

if (!uid) return;

await setDoc(
doc(db,"roles",uid),
{ role:"mod" }
);

alert("Moderador adicionado!");

};

/* POSTAR */

document.getElementById("form-ad")
.onsubmit = async (e)=>{

e.preventDefault();

await addDoc(
collection(db,"roblox_posts"),

{

title:
document.getElementById("title").value,

desc:
document.getElementById("desc").value,

price:
document.getElementById("price").value,

uid:
auth.currentUser.uid,

time:
serverTimestamp()

}

);

document.getElementById("modal")
.style.display="none";

};

/* ESCUTAR POSTS */

function listenPosts(){

const q =
query(
collection(db,"roblox_posts"),
orderBy("time","desc")
);

onSnapshot(q,(snap)=>{

const feed =
document.getElementById("feed");

feed.innerHTML="";

snap.forEach(docSnap=>{

const p =
docSnap.data();

const id =
docSnap.id;

const card =
document.createElement("div");

card.className="service-card";

let canDelete = false;

if (
USER_ROLE==="owner" ||
USER_ROLE==="mod" ||
auth.currentUser.uid===p.uid
){
canDelete=true;
}

card.innerHTML=

`
<h3>${p.title}</h3>

<p>${p.desc}</p>

<b>${p.price}</b>

${canDelete ?
`<button
class="delete-btn"
onclick="deletePost('${id}')">
Excluir
</button>`
:""}

`;

feed.appendChild(card);

});

});

}

/* EXCLUIR */

window.deletePost =
async (id)=>{

await deleteDoc(
doc(db,"roblox_posts",id)
);

};

</script>

</body>
</html>
