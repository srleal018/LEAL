<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Hub - Serviços</title>
    <link rel="icon" href="https://image2url.com/r2/default/images/1774402467122-38f2afde-7636-4704-af10-0cc3f11d2a39.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050507;
            --card-bg: #0f1115;
            --primary: #00f2ff; /* Azul Neon */
            --primary-hover: #00d4ff;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #1e293b;
            --admin-gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; overflow-x: hidden; }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .badge-icon { width: 16px; height: 16px; vertical-align: middle; margin-right: 4px; }
        .currency-icon { width: 18px; height: 18px; vertical-align: middle; margin-right: 5px; }

        header {
            background: rgba(15, 17, 21, 0.8); backdrop-filter: blur(15px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }

        .user-profile { display: flex; align-items: center; gap: 8px; background: #1e293b; padding: 5px 12px; border-radius: 20px; }
        .user-profile img { width: 24px; height: 24px; border-radius: 50%; }

        .search-input, .filter-select { 
            background: rgba(15, 17, 21, 0.7); border: 1px solid var(--border); 
            padding: 10px 15px; border-radius: 8px; color: white; backdrop-filter: blur(5px);
        }

        #admin-announcements {
            margin: 20px 5% 0; padding: 20px; background: linear-gradient(90deg, rgba(0, 114, 128, 0.3) 0%, rgba(15, 17, 21, 0.9) 100%);
            border-radius: 12px; border: 1px solid var(--primary); display: none; backdrop-filter: blur(5px);
        }

        main { padding: 30px 5%; max-width: 1400px; margin: 0 auto; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        .service-card {
            background: rgba(15, 17, 21, 0.85); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; height: 100%;
        }
        .service-card:hover { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }

        .tag { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 4px; background: #00333d; color: #00f2ff; margin-bottom: 12px; display: inline-block; }
        .tag-adm { background: #78350f; color: #fef3c7; }

        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: var(--primary-hover); transform: scale(1.02); }
        .btn-danger { background: #991b1b; color: white; font-size: 11px; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 550px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }

        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #050507; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--primary); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #161b22; border-left: 4px solid var(--primary); padding: 15px 25px; border-radius: 8px; color: white; transform: translateX(150%); transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast-container"></div>

    <div id="login-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="background: rgba(15, 17, 21, 0.9); padding: 50px; border-radius: 20px; border: 1px solid var(--border); text-align: center; backdrop-filter: blur(10px);">
            <img src="https://image2url.com/r2/default/images/1774402467122-38f2afde-7636-4704-af10-0cc3f11d2a39.png" width="80" style="margin-bottom: 20px;">
            <h1>Roblox Hub</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Vitrine de Serviços Neon</p>
            <button class="btn btn-primary" id="btn-login" style="width: 100%; justify-content: center;">Entrar com Google</button>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://image2url.com/r2/default/images/1774402467122-38f2afde-7636-4704-af10-0cc3f11d2a39.png" width="32">
                <span style="font-weight: 800; letter-spacing: 1px;">ROBLOX HUB</span>
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <button class="btn adm-only" id="btn-open-admin" style="display:none; background:#00f2ff; color:#000; font-size:12px;">Painel ADM</button>
                <div class="user-profile">
                    <img id="u-avatar" src=""><span id="u-name" style="font-size:13px;"></span>
                </div>
                <button id="btn-logout" style="background:none; border:none; color:var(--text-muted); cursor:pointer;">Sair</button>
            </div>
        </header>

        <section id="admin-announcements">
            <h4 style="color: var(--primary); margin-bottom: 10px;">📢 AVISOS</h4>
            <div id="admin-notices-list"></div>
        </section>

        <main>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2>Serviços Disponíveis</h2>
                <button class="btn btn-primary" id="btn-add">+ Criar Anúncio</button>
            </div>
            
            <div style="display:flex; gap:15px; margin-bottom:25px;">
                <input type="text" id="search-bar" class="search-input" style="flex:1" placeholder="Pesquisar...">
                <select id="filter-category" class="filter-select">
                    <option value="Todos">Todas as Categorias</option>
                    <option value="Build">Build</option>
                    <option value="Script">Script</option>
                    <option value="GFX Maker">GFX Maker</option>
                    <option value="UI Design">UI Design</option>
                </select>
            </div>

            <div class="services-grid" id="feed"></div>
        </main>
    </div>

    <div class="modal" id="modal-ad">
        <div class="modal-content">
            <h3>Novo Anúncio</h3>
            <form id="form-ad">
                <input type="text" id="title" placeholder="Título" required>
                <select id="category">
                    <option value="Build">Build</option>
                    <option value="Script">Script</option>
                    <option value="GFX Maker">GFX Maker</option>
                    <option value="UI Design">UI Design</option>
                    <option value="Anúncio Geral" class="adm-only" style="display:none;">📢 Anúncio Geral (ADM)</option>
                </select>
                <input type="url" id="media" placeholder="Link da Imagem/Vídeo">
                <textarea id="desc" rows="4" placeholder="Descrição..." required></textarea>
                <input type="text" id="price" placeholder="Preço (Ex: 500 Robux)" required>
                <div style="display:flex; gap:10px;">
                    <button type="button" class="btn" id="btn-cancel" style="background:#27272a; flex:1">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center;">Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="modal-admin">
        <div class="modal-content">
            <h3 style="color:var(--primary)">Gerenciar Cargos</h3>
            <form id="form-admin">
                <input type="text" id="admin-uid-input" placeholder="UID do Usuário" required>
                <select id="admin-role-input">
                    <option value="membro">Membro</option>
                    <option value="adm">Administrador</option>
                </select>
                <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Salvar</button>
                <button type="button" class="btn" id="btn-close-admin" style="width:100%; margin-top:10px; background:#27272a">Fechar</button>
            </form>
        </div>
    </div>

    <div class="modal" id="modal-confirm">
        <div class="modal-content" style="max-width:350px; text-align:center;">
            <p id="confirm-msg" style="margin-bottom:20px;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn" id="btn-confirm-no" style="background:#27272a; flex:1">Não</button>
                <button class="btn btn-primary" id="btn-confirm-yes" style="background:#ef4444; color:white; flex:1">Sim</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, serverTimestamp, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnxMLlQXB1iV6FGGS3zYn-6I8-6wLDE64",
            authDomain: "robloxleallxzz.firebaseapp.com",
            projectId: "robloxleallxzz",
            storageBucket: "robloxleallxzz.firebasestorage.app",
            messagingSenderId: "166808237063",
            appId: "1:166808237063:web:a3091c6b14b448abd3e6a2",
            measurementId: "G-4MFQ5V3R1T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const ADM_UID = "hF0CdUoF5DZF036PlgQPC8T04oy1";

        const BADGES = {
            adm: "https://image2url.com/r2/default/images/1774402297032-7584b3b8-ea4e-4efd-9968-db070178433a.png",
            membro: "https://image2url.com/r2/default/images/1774402198028-522deb5e-dfa7-4b89-acf4-c633e0ddb920.png"
        };

        // CANVAS PARTICULAS (700 AZUL NEON)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize;
        window.onmousemove = (e) => { mouse.x = e.x; mouse.y = e.y; };
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.2;
                this.sx = (Math.random() - 0.5) * 0.8;
                this.sy = (Math.random() - 0.5) * 0.8;
            }
            update() {
                this.x += this.sx; this.y += this.sy;
                if(this.x < 0 || this.x > canvas.width) this.sx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.sy *= -1;
                if(mouse.x) {
                    let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 100) { this.x -= dx/20; this.y -= dy/20; }
                }
            }
            draw() {
                ctx.fillStyle = '#00f2ff';
                ctx.shadowBlur = 5; ctx.shadowColor = '#00f2ff';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init() { 
            particles = []; 
            for(let i=0; i<700; i++) particles.push(new Particle()); 
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();

        // UI HELPERS
        function showToast(m) {
            const t = document.createElement('div'); t.className = 'toast show'; t.innerText = m;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(), 400); }, 3000);
        }

        function showConfirm(m, cb) {
            document.getElementById('confirm-msg').innerText = m;
            document.getElementById('modal-confirm').style.display = 'flex';
            document.getElementById('btn-confirm-yes').onclick = () => { document.getElementById('modal-confirm').style.display='none'; cb(); };
            document.getElementById('btn-confirm-no').onclick = () => document.getElementById('modal-confirm').style.display='none';
        }

        // AUTH & DATABASE
        let isAdmin = false;
        onAuthStateChanged(auth, async user => {
            if(user) {
                isAdmin = (user.uid === ADM_UID);
                const roleDoc = await getDoc(doc(db, "user_roles", user.uid));
                if(roleDoc.exists() && roleDoc.data().role === 'adm') isAdmin = true;

                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('u-avatar').src = user.photoURL;
                document.getElementById('u-name').innerHTML = `<img src="${isAdmin ? BADGES.adm : BADGES.membro}" class="badge-icon"> ${user.displayName}`;
                
                if(isAdmin) document.querySelectorAll('.adm-only').forEach(e => e.style.display='block');
                loadPosts();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('btn-add').onclick = () => document.getElementById('modal-ad').style.display='flex';
        document.getElementById('btn-cancel').onclick = () => document.getElementById('modal-ad').style.display='none';
        document.getElementById('btn-open-admin').onclick = () => document.getElementById('modal-admin').style.display='flex';
        document.getElementById('btn-close-admin').onclick = () => document.getElementById('modal-admin').style.display='none';

        document.getElementById('form-ad').onsubmit = async e => {
            e.preventDefault();
            await addDoc(collection(db, "roblox_posts"), {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                media: document.getElementById('media').value,
                desc: document.getElementById('desc').value,
                price: document.getElementById('price').value,
                uid: auth.currentUser.uid,
                author: auth.currentUser.displayName,
                avatar: auth.currentUser.photoURL,
                role: isAdmin ? 'adm' : 'membro',
                time: serverTimestamp()
            });
            document.getElementById('modal-ad').style.display='none';
            e.target.reset();
            showToast("Publicado com sucesso!");
        };

        document.getElementById('form-admin').onsubmit = async e => {
            e.preventDefault();
            await setDoc(doc(db, "user_roles", document.getElementById('admin-uid-input').value), { role: document.getElementById('admin-role-input').value });
            showToast("Cargo atualizado!");
            document.getElementById('modal-admin').style.display='none';
        };

        function loadPosts() {
            onSnapshot(query(collection(db, "roblox_posts"), orderBy("time", "desc")), snap => {
                const feed = document.getElementById('feed');
                const notices = document.getElementById('admin-notices-list');
                const noticeSec = document.getElementById('admin-announcements');
                feed.innerHTML = ''; notices.innerHTML = '';
                let hasNotice = false;

                snap.forEach(d => {
                    const p = d.data();
                    if(p.category === "Anúncio Geral") {
                        hasNotice = true;
                        notices.innerHTML += `<p>• <strong>${p.title}:</strong> ${p.desc}</p>`;
                        return;
                    }
                    const card = document.createElement('div');
                    card.className = 'service-card';
                    card.innerHTML = `
                        ${p.media ? `<div style="height:180px;background:#000"><img src="${p.media}" style="width:100%;height:100%;object-fit:cover"></div>` : ''}
                        <div style="padding:20px;flex:1">
                            <span class="tag ${p.role==='adm'?'tag-adm':''}">${p.category}</span>
                            <h4>${p.title}</h4>
                            <p style="font-size:12px;color:var(--text-muted);margin:10px 0">${p.desc}</p>
                            <div style="color:var(--primary);font-weight:700">${p.price}</div>
                        </div>
                        <div style="padding:15px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                            <div style="display:flex;align-items:center;gap:5px;font-size:11px">
                                <img src="${p.avatar}" width="20" style="border-radius:50%"> ${p.author}
                            </div>
                            ${(isAdmin || auth.currentUser.uid === p.uid) ? `<button class="btn-danger" onclick="delPost('${d.id}')">Excluir</button>` : ''}
                        </div>
                    `;
                    feed.appendChild(card);
                });
                noticeSec.style.display = hasNotice ? 'block' : 'none';
            });
        }

        window.delPost = (id) => showConfirm("Excluir este anúncio?", () => deleteDoc(doc(db, "roblox_posts", id)));
    </script>
</body>
</html>
