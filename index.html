<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Service Hub | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .neon-blue { border-color: #00d9ff; box-shadow: 0 0 15px rgba(0, 217, 255, 0.3); }
        .neon-purple { border-color: #9d00ff; box-shadow: 0 0 15px rgba(157, 0, 255, 0.3); }
        .btn-gradient { background: linear-gradient(90deg, #00d9ff, #9d00ff); transition: 0.3s; }
        .btn-gradient:hover { opacity: 0.8; transform: scale(1.02); }
        input, textarea { background: rgba(0,0,0,0.5) !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-black tracking-tighter italic text-white">ROBLOX<span class="text-cyan-400">HUB</span></h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest">Sistemas & Scripts de Elite</p>
            </div>
            <div id="auth-status" class="text-right">
                <button id="btn-login" class="text-xs border border-white/20 px-4 py-2 rounded-full hover:bg-white/10">ENTRAR COM GOOGLE</button>
            </div>
        </header>

        <div id="owner-panel" class="hidden glass p-6 mb-8 border-l-4 border-purple-500 animate-pulse">
            <h3 class="text-purple-400 font-bold mb-4 uppercase text-sm tracking-widest">🛡️ Gestão de Hierarquia</h3>
            <div class="flex flex-wrap gap-3">
                <input type="text" id="new-mod-uid" placeholder="Cole o UID do novo Moderador" class="flex-1 p-2 rounded border border-white/10 outline-none">
                <button onclick="promoverUsuario()" class="bg-purple-600 px-6 py-2 rounded font-bold text-xs">ADICIONAR STAFF</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="lg:col-span-1">
                <div class="glass p-6 sticky top-10 neon-blue">
                    <h2 class="text-xl font-bold mb-6 italic text-cyan-400">NOVO ANÚNCIO</h2>
                    <div class="space-y-4">
                        <input type="text" id="title" placeholder="Nome do Produto/Serviço" class="w-full p-3 rounded border border-white/10 outline-none">
                        <textarea id="desc" placeholder="Descreva as funcionalidades..." class="w-full p-3 rounded border border-white/10 h-32 outline-none"></textarea>
                        
                        <div class="p-4 border-2 border-dashed border-white/10 rounded-lg text-center">
                            <p class="text-[10px] text-gray-500 mb-2 uppercase">Arquivo do Script/Build (ZIP, RBXM, LUA)</p>
                            <input type="file" id="file-upload" class="text-xs text-gray-400 file:bg-cyan-600 file:border-0 file:rounded file:px-3 file:py-1 file:text-white cursor-pointer">
                        </div>

                        <button id="publish-btn" class="w-full btn-gradient py-3 rounded font-bold uppercase tracking-tighter">Publicar no Marketplace</button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-2">
                <div id="feed" class="grid grid-cols-1 gap-4">
                    <div class="text-center py-20 text-gray-600">Carregando banco de dados...</div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // CONFIGURAÇÃO DO SEU PROJETO
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        const MEU_ID = "hF0CdUoF5DZF036PlgQPC8T04oy1";

        // LOGIN
        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);

        // MONITOR DE USUÁRIO E CARGOS
        onAuthStateChanged(auth, async (user) => {
            const statusDiv = document.getElementById('auth-status');
            if (user) {
                statusDiv.innerHTML = `<span class="text-xs text-cyan-400">ON: ${user.displayName}</span>`;
                if (user.uid === MEU_ID) {
                    document.getElementById('owner-panel').classList.remove('hidden');
                }
            }
        });

        // ADICIONAR MODERADOR
        window.promoverUsuario = async () => {
            const uid = document.getElementById('new-mod-uid').value;
            if(!uid) return;
            await setDoc(doc(db, "staff", uid), { role: "moderador", date: new Date() });
            alert("Novo moderador registrado!");
        };

        // PUBLICAR COM ARQUIVO
        document.getElementById('publish-btn').onclick = async () => {
            const user = auth.currentUser;
            const file = document.getElementById('file-upload').files[0];
            const title = document.getElementById('title').value;
            const desc = document.getElementById('desc').value;

            if(!user || !file || !title) return alert("Logue e selecione um arquivo!");

            try {
                // 1. Upload do Arquivo
                const fileRef = ref(storage, `hub_files/${Date.now()}_${file.name}`);
                const uploadTask = await uploadBytes(fileRef, file);
                const downloadURL = await getDownloadURL(uploadTask.ref);

                // 2. Salvar no Banco
                await addDoc(collection(db, "posts"), {
                    title,
                    desc,
                    fileURL: downloadURL,
                    fileName: file.name,
                    author: user.displayName,
                    uid: user.uid,
                    createdAt: new Date()
                });

                alert("Serviço publicado com sucesso!");
                location.reload();
            } catch (error) { alert("Erro ao subir arquivo."); }
        };

        // FEED EM TEMPO REAL
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((postDoc) => {
                const p = postDoc.data();
                feed.innerHTML += `
                    <div class="glass p-5 border-l-2 border-cyan-500 hover:bg-white/[0.04] transition">
                        <div class="flex justify-between items-start">
                            <h3 class="text-xl font-bold text-white">${p.title}</h3>
                            ${ (auth.currentUser?.uid === MEU_ID || auth.currentUser?.uid === p.uid) ? 
                                `<button onclick="window.deletarPost('${postDoc.id}')" class="text-[10px] text-red-500 hover:underline">DELETAR</button>` : '' 
                            }
                        </div>
                        <p class="text-sm text-gray-400 my-3">${p.desc}</p>
                        <div class="flex items-center gap-4">
                            <a href="${p.fileURL}" target="_blank" class="bg-white/10 px-4 py-2 rounded text-xs font-bold hover:bg-cyan-500 hover:text-black transition">
                                📥 BAIXAR ${p.fileName.split('.').pop().toUpperCase()}
                            </a>
                            <span class="text-[10px] text-gray-600 uppercase italic">Vendedor: ${p.author}</span>
                        </div>
                    </div>
                `;
            });
        });

        window.deletarPost = async (id) => {
            if(confirm("Deseja apagar este anúncio?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };
    </script>
</body>
</html>
