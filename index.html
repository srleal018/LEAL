<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravador de Tela Pro</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: white;
            margin: 0;
        }
        .controls {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        #startBtn { background-color: #00c853; color: white; }
        #stopBtn { background-color: #d50000; color: white; display: none; }
        #status { margin-top: 15px; color: #aaa; }
        .timer { font-size: 24px; color: #ffeb3b; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Gravador de Tela</h2>
        <div id="timerDisplay" class="timer"></div>
        <button id="startBtn">Começar Gravação</button>
        <button id="stopBtn">Parar e Salvar</button>
        <p id="status">Pronto para gravar</p>
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const timerDisplay = document.getElementById('timerDisplay');

        startBtn.addEventListener('click', async () => {
            try {
                // Solicita a captura da tela
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true
                });

                // Contagem regressiva de 5 segundos para você esconder o menu
                let count = 5;
                startBtn.style.display = 'none';
                status.innerText = "Prepare-se! Minimize o navegador...";
                
                const countdown = setInterval(() => {
                    timerDisplay.innerText = `Iniciando em: ${count}`;
                    count--;
                    if (count < 0) {
                        clearInterval(countdown);
                        timerDisplay.innerText = "GRAVANDO...";
                        startRecording(stream);
                    }
                }, 1000);

            } catch (err) {
                console.error("Erro ao acessar tela: " + err);
                status.innerText = "Erro: Permissão negada ou não suportado.";
            }
        });

        function startRecording(stream) {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                saveVideo();
                // Reseta a interface
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                timerDisplay.innerText = "";
                status.innerText = "Gravação salva no dispositivo!";
            };

            mediaRecorder.start();
            stopBtn.style.display = 'inline-block';
            status.innerText = "Gravando agora!";
        }

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            // Para todos os tracks da stream (fecha a câmera/compartilhamento)
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
        });

        function saveVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            document.body.appendChild(a);
            a.style = 'display: none';
            a.href = url;
            // Nome do arquivo com data/hora
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            a.download = `gravacao-${timestamp}.webm`;
            a.click();
            window.URL.revokeObjectURL(url);
            recordedChunks = [];
        }
    </script>
</body>
</html>
