<style>

/* ======= SEU CSS ORIGINAL ======= */

:root {
--bg-color:#0c0c0e;
--card-bg:#16161a;
--primary:#8b5cf6;

--text-main:#f4f4f5;

}

body{

/* ===== POPUP ANIMADO ===== */

.popup-overlay {

position:fixed;
inset:0;

background:rgba(0,0,0,.8);

display:none;

align-items:center;
justify-content:center;

z-index:9999;

backdrop-filter:blur(5px);

}

.popup-box {

background:var(--card-bg);

padding:25px;

border-radius:16px;

border:1px solid var(--border);

width:100%;
max-width:420px;

animation:scaleIn .2s ease;

}

.popup-buttons {

display:flex;
gap:10px;
margin-top:15px;

}

.popup-buttons button {

flex:1;

}

@keyframes scaleIn {

from{
transform:scale(.85);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

</style>
</head>

<body>

<div id="popup-overlay" class="popup-overlay">

style="display:none;">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
getAuth,

GoogleAuthProvider,

}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
query,
orderBy,
serverTimestamp,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

/* ===============================
   FIREBASE
=============================== */

const firebaseConfig = {

apiKey:"AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",

authDomain:"bloco-de-notas-85103.firebaseapp.com",

projectId:"bloco-de-notas-85103",

storageBucket:"bloco-de-notas-85103.firebasestorage.app",

messagingSenderId:"890697512853",

appId:"1:890697512853:web:7bff196880f1b010d5289c"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider = new GoogleAuthProvider();

/* ===============================
   HIERARQUIA
=============================== */

const OWNER_UID =
"hF0CdUoF5DZF036PlgQPC8T04oy1";

let USER_ROLE = "user";

/* CARREGAR ROLE */

async function loadUserRole(user){

if(user.uid===OWNER_UID){

USER_ROLE="owner";

return;

}

const roleRef =
doc(db,"roles",user.uid);

const roleSnap =
await getDoc(roleRef);

if(roleSnap.exists()){

USER_ROLE=
roleSnap.data().role;

}

}

/* ===============================
   POPUP SYSTEM
=============================== */

function showPopup({
title="Aviso",
text="",
type="alert"
}){

return new Promise(resolve=>{

const overlay =
document.getElementById("popup-overlay");

const titleEl =
document.getElementById("popup-title");

const textEl =
document.getElementById("popup-text");

const inputEl =
document.getElementById("popup-input");

const btnCancel =
document.getElementById("popup-cancel");

const btnConfirm =
document.getElementById("popup-confirm");

titleEl.innerText=title;

textEl.innerText=text;

overlay.style.display="flex";

inputEl.style.display=
type==="prompt"
? "block"
: "none";

btnCancel.style.display=
type==="alert"
? "none"
: "block";

btnConfirm.onclick=()=>{

overlay.style.display="none";

if(type==="prompt"){

resolve(inputEl.value);

}

else{

resolve(true);

}

};

btnCancel.onclick=()=>{

overlay.style.display="none";

resolve(false);

};

});

}

/* ===============================
   LOGIN
=============================== */

onAuthStateChanged(auth,
async(user)=>{

if(user){

await loadUserRole(user);

/* aqui continua seu sistema original */

}

});

/* ===============================
   DELETE POST
=============================== */

window.deletePost =
async(id)=>{

const ok =
await showPopup({

title:"Excluir",

text:"Tem certeza que deseja excluir?",

type:"confirm"

});

if(!ok) return;

await deleteDoc(
doc(db,"roblox_posts",id)
);

};

/* ===============================
   ADD MOD
=============================== */

async function addModerator(){

if(USER_ROLE!=="owner"){

showPopup({
title:"Erro",
text:"Apenas o dono pode adicionar moderadores"
});

return;

}

const uid =
await showPopup({

title:"Adicionar Moderador",

text:"Digite o UID:",

type:"prompt"

});

if(!uid) return;

await setDoc(
doc(db,"roles",uid),
{ role:"mod" }
);

showPopup({
title:"Sucesso",
text:"Moderador adicionado!"
});

}

</script>
