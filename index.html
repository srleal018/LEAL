<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Roblox Serviços</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0d1117;
color:white;
}

header{
background:#161b22;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #30363d;
}

.logo{
font-size:22px;
font-weight:700;
color:#58a6ff;
}

button{
background:#238636;
border:none;
padding:10px 18px;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:500;
}

button:hover{
background:#2ea043;
}

.container{
padding:20px;
}

.form{
background:#161b22;
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:none;
}

input, textarea, select{

width:100%;
padding:10px;
margin-top:10px;
background:#0d1117;
border:1px solid #30363d;
border-radius:8px;
color:white;

}

.cards{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;

}

.card{

background:#161b22;
padding:15px;
border-radius:12px;
border:1px solid #30363d;

}

.card h3{

margin:0;

}

.category{

color:#58a6ff;
font-size:13px;

}

.user{

font-size:12px;
color:#8b949e;

}

</style>
</head>

<body>

<header>

<div class="logo">
🎮 Roblox Serviços
</div>

<div>

<button onclick="loginGoogle()" id="loginBtn">
Login Google
</button>

<button onclick="logout()" id="logoutBtn" style="display:none;background:#da3633;">
Sair
</button>

</div>

</header>

<div class="container">

<button onclick="abrirForm()" id="criarBtn" style="display:none;margin-bottom:15px;">
➕ Criar Anúncio
</button>

<div class="form" id="form">

<h2>Criar Anúncio</h2>

<select id="categoria">

<option>Builds</option>
<option>Scripts</option>
<option>GFX Maker</option>
<option>UI Designer</option>
<option>Modelagem</option>

</select>

<input type="text" id="titulo" placeholder="Título do serviço">

<textarea id="descricao" placeholder="Descrição do serviço"></textarea>

<button onclick="criarAnuncio()">
Publicar
</button>

</div>

<div class="cards" id="cards"></div>

</div>

<script type="module">

// FIREBASE

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import { getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",

authDomain: "bloco-de-notas-85103.firebaseapp.com",

projectId: "bloco-de-notas-85103",

storageBucket: "bloco-de-notas-85103.firebasestorage.app",

messagingSenderId: "890697512853",

appId: "1:890697512853:web:7bff196880f1b010d5289c",

measurementId: "G-SKDH1JR99T"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth();

const provider = new GoogleAuthProvider();

let usuario = null;

// LOGIN

window.loginGoogle = async () => {

await signInWithPopup(auth, provider);

};

// LOGOUT

window.logout = async () => {

await signOut(auth);

};

// ESTADO LOGIN

onAuthStateChanged(auth, (user) => {

if(user){

usuario = user;

document.getElementById("loginBtn").style.display="none";

document.getElementById("logoutBtn").style.display="inline";

document.getElementById("criarBtn").style.display="inline";

}else{

usuario=null;

document.getElementById("loginBtn").style.display="inline";

document.getElementById("logoutBtn").style.display="none";

document.getElementById("criarBtn").style.display="none";

}

});

// FORM

window.abrirForm = () => {

let f=document.getElementById("form");

f.style.display = f.style.display=="none" ? "block" : "none";

};

// CRIAR ANUNCIO

window.criarAnuncio = async () => {

if(!usuario){

alert("Faça login primeiro");

return;

}

let categoria=document.getElementById("categoria").value;

let titulo=document.getElementById("titulo").value;

let descricao=document.getElementById("descricao").value;

if(!titulo || !descricao){

alert("Preencha tudo");

return;

}

await addDoc(collection(db,"anuncios"),{

categoria,

titulo,

descricao,

usuario:usuario.displayName,

uid:usuario.uid,

data:Date.now()

});

carregarAnuncios();

document.getElementById("titulo").value="";
document.getElementById("descricao").value="";

};

// CARREGAR ANUNCIOS

async function carregarAnuncios(){

let cards=document.getElementById("cards");

cards.innerHTML="";

let querySnapshot = await getDocs(collection(db,"anuncios"));

querySnapshot.forEach((doc)=>{

let d=doc.data();

let card=`

<div class="card">

<h3>${d.titulo}</h3>

<div class="category">
${d.categoria}
</div>

<p>
${d.descricao}
</p>

<div class="user">
Por ${d.usuario}
</div>

</div>

`;

cards.innerHTML+=card;

});

}

carregarAnuncios();

</script>

</body>
</html>
