<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Web Obby 3D</title>
    <style>
        /* Removemos as margens para o jogo ocupar a tela inteira do celular */
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; }
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: white; 
            font-family: sans-serif; 
            font-size: 24px; 
            font-weight: bold; 
            text-shadow: 2px 2px 0 #000; 
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">Toque na tela para pular!</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. Configuração do Cenário e Câmera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Céu azul

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Iluminação
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x606060));

        // 3. O Jogador (Cubo Vermelho)
        const playerGeometry = new THREE.BoxGeometry(1, 1, 1);
        const playerMaterial = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const player = new THREE.Mesh(playerGeometry, playerMaterial);
        player.position.set(0, 5, 0);
        scene.add(player);

        // 4. Sistema de Plataformas
        const platforms = [];
        const platformGeometry = new THREE.BoxGeometry(4, 0.5, 4);
        const platformMaterial = new THREE.MeshLambertMaterial({ color: 0x00ff00 });

        function createPlatform(x, y, z) {
            const plat = new THREE.Mesh(platformGeometry, platformMaterial);
            plat.position.set(x, y, z);
            scene.add(plat);
            platforms.push(plat);
        }

        // Desenhando o mapa do Obby (x, altura y, profundidade z)
        createPlatform(0, 0, 0);
        createPlatform(0, 1.5, -7);
        createPlatform(3, 3, -14);
        createPlatform(-3, 4.5, -21);
        createPlatform(0, 6, -28); // Chegada

        // 5. Física e Controles Mobile/PC
        let velocityY = 0;
        const gravity = -0.012;
        let isGrounded = false;
        const speed = 0.1; // Velocidade que o jogador corre para frente

        // Identifica o toque na tela ou clique
        window.addEventListener('pointerdown', () => {
            if (isGrounded) {
                velocityY = 0.35; // Força do pulo
                isGrounded = false;
            }
        });

        // 6. Loop Principal do Jogo
        function animate() {
            requestAnimationFrame(animate);

            // Aplica a gravidade e o movimento constante
            velocityY += gravity;
            player.position.y += velocityY;
            player.position.z -= speed; 

            // A câmera segue o jogador
            camera.position.z = player.position.z + 6;
            camera.position.y = player.position.y + 4;
            camera.lookAt(player.position);

            // Sistema de Morte (Caiu no vazio)
            if (player.position.y < -10) {
                player.position.set(0, 5, 0); // Reseta a posição
                velocityY = 0;
            }

            // Sistema de Colisão com as Plataformas
            isGrounded = false;
            for (let plat of platforms) {
                // Checa se as bordas do jogador estão dentro das bordas da plataforma
                if (
                    Math.abs(player.position.x - plat.position.x) < 2.5 &&
                    Math.abs(player.position.z - plat.position.z) < 2.5 &&
                    player.position.y - plat.position.y <= 1 &&
                    player.position.y - plat.position.y >= 0 &&
                    velocityY <= 0
                ) {
                    player.position.y = plat.position.y + 0.75;
                    velocityY = 0;
                    isGrounded = true;
                }
            }

            renderer.render(scene, camera);
        }

        // Redimensiona o jogo se a tela virar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
