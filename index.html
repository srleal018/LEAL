<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Hub - Serviços</title>
    <link rel="icon" href="https://image2url.com/r2/default/images/1774402467122-38f2afde-7636-4704-af10-0cc3f11d2a39.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: #16161a;
            --primary: #8b5cf6;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --border: #27272a;
            --admin-gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; }

        /* BADGES STYLE */
        .badge-icon { width: 16px; height: 16px; vertical-align: middle; margin-right: 4px; }
        .currency-icon { width: 18px; height: 18px; vertical-align: middle; margin-right: 5px; }

        /* HEADER */
        header {
            background: rgba(22, 22, 26, 0.95); backdrop-filter: blur(10px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-main { width: 32px; height: 32px; }

        .user-nav { display: flex; align-items: center; gap: 15px; }
        .user-profile { display: flex; align-items: center; gap: 8px; background: #27272a; padding: 5px 12px; border-radius: 20px; }
        .user-profile img { width: 24px; height: 24px; border-radius: 50%; }

        /* ANÚNCIOS GERAIS (ADM) */
        #admin-announcements {
            margin: 20px 5% 0; padding: 20px; background: linear-gradient(90deg, #1e1b4b 0%, #16161a 100%);
            border-radius: 12px; border: 1px solid #3730a3; display: none;
        }

        /* GRID E CARDS */
        main { padding: 30px 5%; max-width: 1300px; margin: 0 auto; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; margin-top: 30px; }

        .service-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px;
            overflow: hidden; display: flex; flex-direction: column; transition: 0.3s;
        }
        .service-card:hover { border-color: var(--primary); transform: translateY(-3px); }

        .card-content { padding: 20px; flex-grow: 1; }
        .tag { font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; background: #2e1065; color: #ddd6fe; margin-bottom: 12px; display: inline-block; }
        .tag-adm { background: #78350f; color: #fef3c7; }

        .media-container { width: 100%; background: #000; display: flex; justify-content: center; }
        .media-container img, .media-container video { width: 100%; max-height: 220px; object-fit: cover; }

        .card-footer { padding: 15px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #1c1c21; }
        
        /* BOTÕES */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #991b1b; color: white; font-size: 12px; }
        
        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 550px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #0f0f12; border: 1px solid var(--border); color: white; border-radius: 8px; margin-bottom: 15px; }

        /* LOGIN */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="background: var(--card-bg); padding: 50px; border-radius: 20px; border: 1px solid var(--border);">
            <img src="https://image2url.com/r2/default/images/1774402467122-38f2afde-7636-4704-af10-0cc3f11d2a39.png" width="80" style="margin-bottom: 20px;">
            <h1>Roblox Hub</h1>
            <p style="color: var(--text-muted); margin-bottom: 30px;">Entre para acessar a plataforma de serviços.</p>
            <button class="btn btn-primary" id="btn-login" style="width: 100%;">Entrar com Google</button>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <header>
            <div class="logo-area">
                <img src="https://image2url.com/r2/default/images/1774402467122-38f2afde-7636-4704-af10-0cc3f11d2a39.png" class="logo-main">
                <span style="font-weight: 800; letter-spacing: 1px;">ROBLOX HUB</span>
            </div>
            <div class="user-nav">
                <div class="user-profile">
                    <img id="u-avatar" src="">
                    <span id="u-name" style="font-size: 13px; font-weight: 600;"></span>
                </div>
                <button class="btn" id="btn-logout" style="background: transparent; border: 1px solid var(--border); color: var(--text-muted);">Sair</button>
            </div>
        </header>

        <section id="admin-announcements">
            <h4 style="color: var(--admin-gold); display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                <img src="https://image2url.com/r2/default/images/1774402297032-7584b3b8-ea4e-4efd-9968-db070178433a.png" width="18">
                ANÚNCIOS GERAIS DA ADMINISTRAÇÃO
            </h4>
            <div id="admin-notices-list" style="font-size: 14px; color: #e2e8f0;"></div>
        </section>

        <main>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Serviços & Parcerias</h2>
                <button class="btn btn-primary" id="btn-add">+ Criar Anúncio</button>
            </div>

            <div class="services-grid" id="feed"></div>
        </main>
    </div>

    <div class="modal" id="modal-ad">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Nova Publicação</h3>
            <form id="form-ad">
                <label>Título</label>
                <input type="text" id="title" required>
                
                <label>Categoria</label>
                <select id="category">
                    <option value="Build">Build</option>
                    <option value="Script">Script</option>
                    <option value="GFX Maker">GFX Maker</option>
                    <option value="UI Design">UI Design</option>
                    <option value="Outros">Outros</option>
                    <option value="Parcerias" class="adm-only" style="display:none;">🤝 Parcerias (ADM)</option>
                    <option value="Avisos" class="adm-only" style="display:none;">⚠️ Avisos da ADM</option>
                    <option value="Anúncio Geral" class="adm-only" style="display:none;">📢 Anúncio Geral (Topo)</option>
                </select>

                <label>URL Imagem/Vídeo (Link Direto)</label>
                <input type="url" id="media" placeholder="https://...">

                <label>Descrição e Links</label>
                <textarea id="desc" rows="4" required></textarea>

                <label>Preço</label>
                <input type="text" id="price" placeholder="Ex: 500 Robux ou R$ 20,00" required>

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" class="btn" id="btn-cancel" style="flex:1; background: #27272a;">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;">Publicar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const ADM_UID = "hF0CdUoF5DZF036PlgQPC8T04oy1";

        const BADGES = {
            adm: "https://image2url.com/r2/default/images/1774402297032-7584b3b8-ea4e-4efd-9968-db070178433a.png",
            membro: "https://image2url.com/r2/default/images/1774402198028-522deb5e-dfa7-4b89-acf4-c633e0ddb920.png",
            robux: "https://image2url.com/r2/default/images/1774402379720-05a80f89-33fb-4e48-895c-acc603f0efad.png",
            money: "https://image2url.com/r2/default/images/1774402438176-eee0bff8-e429-4336-a83a-28e49a61789a.png",
            all: "https://image2url.com/r2/default/images/1774402355307-85cbdd2a-e541-430a-9cf8-67d1bd550703.png"
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('u-avatar').src = user.photoURL;
                document.getElementById('u-name').innerHTML = `<img src="${user.uid === ADM_UID ? BADGES.adm : BADGES.membro}" class="badge-icon"> ${user.displayName}`;
                
                if(user.uid === ADM_UID) {
                    document.querySelectorAll('.adm-only').forEach(el => el.style.display = 'block');
                }
                loadPosts();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btn-logout').onclick = () => signOut(auth);
        document.getElementById('btn-add').onclick = () => document.getElementById('modal-ad').style.display = 'flex';
        document.getElementById('btn-cancel').onclick = () => document.getElementById('modal-ad').style.display = 'none';

        document.getElementById('form-ad').onsubmit = async (e) => {
            e.preventDefault();
            const category = document.getElementById('category').value;
            
            await addDoc(collection(db, "roblox_posts"), {
                title: document.getElementById('title').value,
                category: category,
                media: document.getElementById('media').value,
                desc: document.getElementById('desc').value,
                price: document.getElementById('price').value,
                uid: auth.currentUser.uid,
                author: auth.currentUser.displayName,
                avatar: auth.currentUser.photoURL,
                time: serverTimestamp()
            });
            
            document.getElementById('modal-ad').style.display = 'none';
            e.target.reset();
            loadPosts();
        };

        async function loadPosts() {
            const q = query(collection(db, "roblox_posts"), orderBy("time", "desc"));
            const snap = await getDocs(q);
            const feed = document.getElementById('feed');
            const adminBar = document.getElementById('admin-notices-list');
            const adminSection = document.getElementById('admin-announcements');
            
            feed.innerHTML = '';
            adminBar.innerHTML = '';
            let hasAdminNotice = false;

            snap.forEach(d => {
                const p = d.data();
                const isVideo = p.media && p.media.match(/\.(mp4|webm)$/i);
                const isAdm = p.uid === ADM_UID;
                const badge = isAdm ? BADGES.adm : BADGES.membro;
                
                // Formata links na descrição
                const descFormatted = p.desc.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color:var(--primary)">$1</a>');

                // Se for Anúncio Geral, vai para a barra do topo
                if (p.category === "Anúncio Geral") {
                    hasAdminNotice = true;
                    adminBar.innerHTML += `<div style="margin-bottom:5px;">• <strong>${p.title}:</strong> ${descFormatted}</div>`;
                    return;
                }

                const card = document.createElement('div');
                card.className = 'service-card';
                card.innerHTML = `
                    ${p.media ? `<div class="media-container">${isVideo ? `<video src="${p.media}" controls></video>` : `<img src="${p.media}">`}</div>` : ''}
                    <div class="card-content">
                        <span class="tag ${isAdm ? 'tag-adm' : ''}">${p.category}</span>
                        <h3 style="margin-bottom:10px;">${p.title}</h3>
                        <p style="font-size:14px; color:var(--text-muted); white-space:pre-wrap;">${descFormatted}</p>
                    </div>
                    <div class="card-footer">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <img src="${p.avatar}" style="width:24px; height:24px; border-radius:50%;">
                            <span style="font-size:12px; font-weight:600;">
                                <img src="${badge}" class="badge-icon"> ${p.author}
                            </span>
                        </div>
                        <div style="text-align:right">
                            <span style="font-size:14px; font-weight:700; color:#10b981;">
                                <img src="${p.price.toLowerCase().includes('robux') ? BADGES.robux : BADGES.money}" class="currency-icon">
                                ${p.price}
                            </span>
                            ${(auth.currentUser.uid === ADM_UID || auth.currentUser.uid === p.uid) ? 
                                `<br><button class="btn-danger" style="margin-top:8px; border-radius:4px;" onclick="deletePost('${d.id}')">Excluir</button>` : ''}
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });

            adminSection.style.display = hasAdminNotice ? 'block' : 'none';
        }

        window.deletePost = async (id) => {
            if(confirm("Excluir anúncio?")) {
                await deleteDoc(doc(db, "roblox_posts", id));
                loadPosts();
            }
        };
    </script>
</body>
</html>
